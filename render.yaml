# Render Blueprint Configuration for ExplAIner
# This file defines a single production environment that deploys from the main branch
# Auto-deploys whenever a PR is merged into main

services:
  # Server API
  - type: web
    name: explainer-server
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./server/Dockerfile.prd
    dockerContext: ./server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: explainer-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Note: CLIENT_URL is auto-generated by Render during initial deployment, you need manually update it once after initial deployment and re-deploy! 
      - key: CLIENT_URL
        value: https://www.explainer-app.de # If you want to connect your custom domain, simply follow this guide: https://render.com/docs/custom-domains
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5-20250929
      # Note: ANTHROPIC_API_KEY must be added manually via Render Dashboard (sensitive)

  # Client
  - type: web
    name: explainer-client
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./client/Dockerfile.prd
    dockerContext: ./client
    envVars:
      # Note: NEXT_PUBLIC_API_URL (= Server URL) is auto-generated by Render during initial deployment, you need manually update it once after initial deployment and re-deploy! 
      - key: NEXT_PUBLIC_API_URL
        value: https://explainer-server.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  # PostgreSQL (Production)
  - name: explainer-postgres
    plan: basic-256mb
    region: frankfurt
    databaseName: explainer
    user: explainer_user

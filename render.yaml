# Render Blueprint Configuration for ExplAIner
# This file defines two deployment environments: dev and prd

services:
  # Backend API for DEV environment
  - type: web
    name: explainer-backend-dev
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: develop # Auto-deploy from develop branch
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: explainer-postgres-dev
          property: connectionString
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3001
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start:prod

  # Backend API for PRD environment
  - type: web
    name: explainer-backend-prd
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: explainer-postgres-prd
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start:prod

  # Frontend for DEV environment
  - type: web
    name: explainer-frontend-dev
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: develop # Auto-deploy from develop branch
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://explainer-backend-dev.onrender.com # Update with actual backend dev URL after first deploy
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3000
    buildCommand: npm install && npm run build
    startCommand: npm run start

  # Frontend for PRD environment
  - type: web
    name: explainer-frontend-prd
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://explainer-backend-prd.onrender.com # Update with actual backend prd URL after first deploy
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    buildCommand: npm install && npm run build
    startCommand: npm run start

# Database definitions
databases:
  # PostgreSQL for DEV environment
  - name: explainer-postgres-dev
    plan: starter # Free tier for 90 days, then $7/month
    region: frankfurt
    databaseName: explainer_dev
    user: explainer_dev_user

  # PostgreSQL for PRD environment
  - name: explainer-postgres-prd
    plan: starter # Free tier for 90 days, then $7/month
    region: frankfurt
    databaseName: explainer_prd
    user: explainer_prd_user

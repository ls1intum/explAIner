# Render Blueprint Configuration for ExplAIner
# This file defines a single production environment that deploys from the main branch
# Auto-deploys whenever a PR is merged into main

services:
  # Backend API
  - type: web
    name: explainer-backend
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./backend/Dockerfile.prd
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: explainer-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://www.explainer-app.de
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5-20250929
      # Note: ANTHROPIC_API_KEY must be added via Render Dashboard (sensitive)

  # Frontend
  - type: web
    name: explainer-frontend
    runtime: docker
    plan: starter # Free tier
    region: frankfurt
    branch: main # Auto-deploy from main branch
    dockerfilePath: ./frontend/Dockerfile.prd
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://explainer-backend-cbnx.onrender.com # Backend URL
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  # PostgreSQL (Production)
  - name: explainer-postgres
    plan: basic-256mb
    region: frankfurt
    databaseName: explainer
    user: explainer_user

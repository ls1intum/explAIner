name: explainer-dev

services:
  
  db:
    image: postgres:16-alpine
    container_name: explainer-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - explainer-network-dev

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: explainer-server-dev
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # 'db' hostname works because of Docker networking
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: development
      PORT: ${SERVER_PORT}
      CLIENT_URL: ${CLIENT_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      # Local directory mounted for hot-reload
      - ./server:/app
      - /app/node_modules
    networks:
      - explainer-network-dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: explainer-client-dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: development
      # Optional soft access gate (see client/src/middleware.ts). Unset = open.
      SITE_ACCESS_TOKEN: ${SITE_ACCESS_TOKEN:-}
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    volumes:
      # Local directory mounted for hot-reload
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - explainer-network-dev

volumes:
  postgres_data_dev:
    driver: local
    name: explainer-dev-postgres-data

networks:
  explainer-network-dev:
    driver: bridge
    name: explainer-network-dev

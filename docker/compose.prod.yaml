name: explainer-prd

# Production deployment compose for the ls1intum CI/CD workflow.
# Images are pulled from ghcr.io (built by .github/workflows/build-and-push.yml).
# The .env file next to this compose file is generated on the VM by the deploy
# workflow from the GitHub "Production" environment secrets/variables + IMAGE_TAG.
#
# The VM firewall only exposes ports 22/80/443, so the single public entrypoint
# is the nginx proxy: it terminates TLS on 443 (RBG certificate), redirects 80,
# serves the client at / and proxies /api to the server. client/server are only
# reachable on the internal docker network.

services:

  db:
    image: postgres:16-alpine
    container_name: explainer-db-prd
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prd:/var/lib/postgresql/data
    networks:
      - explainer-network-prd

  server:
    image: "ghcr.io/ls1intum/explainer/server:${IMAGE_TAG}"
    container_name: explainer-server-prd
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # 'db' hostname works because of Docker networking
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: ${SERVER_PORT}
      CLIENT_URL: ${CLIENT_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    # No published ports - reached via the proxy on the internal network.
    networks:
      - explainer-network-prd

  client:
    image: "ghcr.io/ls1intum/explainer/client:${IMAGE_TAG}"
    container_name: explainer-client-prd
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      PORT: ${CLIENT_PORT}
      # NOTE: the soft access gate (client/src/middleware.ts) runs in Next's
      # Edge runtime and can only read SITE_ACCESS_TOKEN if it was inlined at
      # *build* time. It is therefore passed as a build arg in
      # .github/workflows/build-and-push.yml (vars.SITE_ACCESS_TOKEN), NOT here.
      # A runtime value at this layer has no effect on the gate.
    # No published ports - reached via the proxy on the internal network.
    networks:
      - explainer-network-prd

  proxy:
    image: nginx:alpine
    container_name: explainer-proxy-prd
    restart: unless-stopped
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # RBG TLS certificates live on the VM. Mounted at the SAME path so the
      # absolute symlinks in live/ (-> /var/lib/rbg-cert/<timestamp>/) resolve
      # inside the container too.
      - /var/lib/rbg-cert:/var/lib/rbg-cert:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - explainer-network-prd

# nginx config shipped inline so the deploy workflow (which only copies this
# compose file + the .env) needs no extra files on the VM. nginx variables are
# escaped as $$ so docker compose does not interpolate them. Upstream ports
# match SERVER_PORT/CLIENT_PORT (3001/3000).
configs:
  nginx_conf:
    content: |
      # Redirect all plain HTTP to HTTPS
      server {
        listen 80;
        server_name _;
        return 301 https://$$host$$request_uri;
      }

      server {
        listen 443 ssl;
        server_name explainer.aet.cit.tum.de;

        ssl_certificate     "/var/lib/rbg-cert/live/host:f:aetvm80.cit.tum.de.fullchain.pem";
        ssl_certificate_key "/var/lib/rbg-cert/live/host:f:aetvm80.cit.tum.de.privkey.pem";

        client_max_body_size 25m;

        # API -> NestJS server (global prefix /api is preserved)
        location /api/ {
          proxy_pass http://server:3001;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_read_timeout 300s;
        }

        # Everything else -> Next.js client
        location / {
          proxy_pass http://client:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }
      }

volumes:
  postgres_data_prd:
    driver: local
    name: explainer-prd-postgres-data

networks:
  explainer-network-prd:
    driver: bridge
    name: explainer-network-prd

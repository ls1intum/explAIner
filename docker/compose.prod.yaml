name: explainer-prd

# Production deployment compose for the ls1intum CI/CD workflow.
# Images are pulled from ghcr.io (built by .github/workflows/build-and-push.yml).
# The .env file next to this compose file is generated on the VM by the deploy
# workflow from the GitHub "Production" environment secrets/variables + IMAGE_TAG.

services:

  db:
    image: postgres:16-alpine
    container_name: explainer-db-prd
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prd:/var/lib/postgresql/data
    networks:
      - explainer-network-prd

  server:
    image: "ghcr.io/ls1intum/explainer/server:${IMAGE_TAG}"
    container_name: explainer-server-prd
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # 'db' hostname works because of Docker networking
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: ${SERVER_PORT}
      CLIENT_URL: ${CLIENT_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    networks:
      - explainer-network-prd

  client:
    image: "ghcr.io/ls1intum/explainer/client:${IMAGE_TAG}"
    container_name: explainer-client-prd
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      PORT: ${CLIENT_PORT}
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    networks:
      - explainer-network-prd

volumes:
  postgres_data_prd:
    driver: local
    name: explainer-prd-postgres-data

networks:
  explainer-network-prd:
    driver: bridge
    name: explainer-network-prd

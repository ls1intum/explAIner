name: explainer-prd

services:
  
  db:
    image: postgres:16-alpine
    container_name: explainer-db-prd
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # Different port to avoid conflicts with dev environment
      - "5433:5432"
    volumes:
      - postgres_data_prd:/var/lib/postgresql/data
    networks:
      - explainer-network-prd

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prd
    container_name: explainer-server-prd
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # 'db' hostname works because of Docker networking
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: production
      PORT: ${SERVER_PORT}
      CLIENT_URL: ${CLIENT_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    # No volumes - production build is self-contained
    networks:
      - explainer-network-prd

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prd
      args:
        # NEXT_PUBLIC_* vars are baked into the bundle at build time, so must be passed as build args
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: explainer-client-prd
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      PORT: ${CLIENT_PORT}
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    # No volumes - production build is self-contained
    networks:
      - explainer-network-prd

volumes:
  postgres_data_prd:
    driver: local
    name: explainer-prd-postgres-data

networks:
  explainer-network-prd:
    driver: bridge
    name: explainer-network-prd
